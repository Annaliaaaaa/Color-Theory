<!doctype html>
<html lang="en">

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

            <div class="col-4">

        </div>
        <div class="row">
            <div class="col-2">
                <div class="div" id="red-orange"></div>

            </div>
            <div class="col-2">

            </div>
            <div class="col-2">

            </div>
            <div class="col-2">
                <div class="div" id="blue-green"></div>
                 <h5></h5>
            </div>
            <div class="col-2">
                <div class="div" id="blue-violet"></div>
                 <h5></h5>
            </div>
            <div class="col-2">
                <div class="div" id="red-violet"></div>
                 <h5></h5>
            </div>
        </div>
        <div class="col-12">
                <h2 class="text-center">Cool Colors</h2>

            <div class="row">
            <div class="col-2">

            </div>

            </div>
            <div class="col-2">
